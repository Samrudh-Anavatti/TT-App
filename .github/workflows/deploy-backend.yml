name: Deploy backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

# ── One-time Azure setup (see README > Deployment) ────────────────────────────
# 1. Create a Linux Web App running Python 3.11 (Free F1 tier is fine).
# 2. On the Web App, set these Configuration > Application settings:
#      SCM_DO_BUILD_DURING_DEPLOYMENT = true   (so Azure pip-installs requirements)
#      DATA_DIR        = /home/data            (persisted SQLite storage)
#      CORS_ORIGINS    = https://<username>.github.io
#      SEED_ON_STARTUP = true
#      STANMORE_PIN / YORKGARDENS_PIN = your real PINs
#    and the Startup Command:
#      bash startup.sh          (see backend/startup.sh)
# 3. Add to the GitHub repo:
#      Variable  AZURE_WEBAPP_NAME            (Settings > Variables)
#      Secret    AZURE_WEBAPP_PUBLISH_PROFILE (Web App > "Get publish profile")
# Until the AZURE_WEBAPP_NAME variable exists, the deploy step is skipped so the
# tests still run green on every push.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps & run tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest -q

      - name: Deploy to Azure Web App
        if: ${{ vars.AZURE_WEBAPP_NAME != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
