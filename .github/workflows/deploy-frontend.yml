name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        env:
          # Project sites are served from /<repo>/ — set Vite base accordingly.
          VITE_BASE: /${{ github.event.repository.name }}/
          # Point the SPA at your deployed backend. Set repo variable VITE_API_URL
          # (Settings > Secrets and variables > Actions > Variables) e.g.
          # https://your-backend.azurewebsites.net/api/v1
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          # Soft club-entry PINs (NOT the admin PIN). Set repo variable VITE_CLUB_PINS
          # as "slug:pin" pairs, e.g. "stanmore:1234, york-gardens:5678". A club with
          # no pair here is left open. Re-run this workflow after changing it.
          VITE_CLUB_PINS: ${{ vars.VITE_CLUB_PINS }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
